name: PR Checks

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-changes:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install tools
        run: make dev-setup

      - name: Run make ci
        run: make ci
